<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidyagyan Network Authentication</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            /* Vidyagyan Brand Colors extracted from your portal */
            --brand-primary: #055bb5; 
            --brand-secondary: #1987cb;
            --brand-success: #44ac33;
            --brand-danger: #e76644;
            --bg-main: #f4f7f9;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --text-muted: #6b7280;
            --border-color: #d7dbdd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Subtle top accent bar in brand blue */
            border-top: 6px solid var(--brand-primary); 
        }

        .auth-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* Logo Area */
        .logo-container {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
        }

        .logo-container img {
            max-height: 60px;
            object-fit: contain;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        /* Status Banner */
        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border-radius: 6px;
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--text-muted);
        }

        .status-dot.online { background-color: var(--brand-success); box-shadow: 0 0 0 3px rgba(68, 172, 51, 0.15); }
        .status-dot.offline { background-color: var(--brand-danger); box-shadow: 0 0 0 3px rgba(231, 102, 68, 0.15); }

        /* Floating Label Inputs */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 0.5rem 1rem;
            font-size: 1rem;
            font-family: inherit;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: transparent;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--brand-primary);
        }

        .input-group label {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.95rem;
            color: var(--text-muted);
            pointer-events: none;
            transition: 0.2s ease all;
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: 0.5rem;
            font-size: 0.75rem;
            color: var(--brand-primary);
            font-weight: 500;
        }

        /* Auto-Reconnect Toggle */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            text-align: left;
        }

        .toggle-text strong {
            display: block;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .toggle-text span {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--brand-primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 0.85rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--brand-primary);
            color: white;
            margin-bottom: 1rem;
        }

        .btn-primary:hover { background-color: #044a94; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

        .btn-outline {
            background-color: transparent;
            color: var(--brand-primary);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover {
            background-color: #f8fafc;
            border-color: var(--brand-primary);
        }

        #sysMessage {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            min-height: 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-container">
            <img src="https://www.vidyagyan.in/wp-content/themes/vidyagyan/images/logo.png" alt="Vidyagyan Logo" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Vidyagyan_logo.svg/512px-Vidyagyan_logo.svg.png'">
        </div>
        
        <h2 id="userHeader">Network Authentication</h2>
        <p class="subtitle">Enter your AD credentials to access the internet</p>

        <div class="status-badge" id="statusBadge">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Establishing secure link...</span>
        </div>

        <div class="input-group">
            <input type="text" id="username" placeholder=" " autocomplete="off">
            <label for="username">User ID (e.g. AD1111)</label>
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder=" ">
            <label for="password">Password</label>
        </div>

        <div class="toggle-wrapper">
            <div class="toggle-text">
                <strong>Auto-Reconnect</strong>
                <span>Maintain session in background</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="autoReconnect" checked>
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn btn-primary" onclick="connect()" id="btnConnect">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
            Sign In
        </button>

        <button class="btn btn-outline" onclick="disconnect()" id="btnDisconnect">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Sign Out
        </button>

        <div id="sysMessage"></div>
    </div>

    <script>
        const sysMessage = document.getElementById('sysMessage');

        function printMsg(text, isError = false) {
            sysMessage.style.color = isError ? 'var(--brand-danger)' : 'var(--text-muted)';
            sysMessage.innerText = text;
            setTimeout(() => { sysMessage.innerText = ''; }, 5000);
        }

        async function connect() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const autoReconnect = document.getElementById('autoReconnect').checked;

            if (!username || !password) {
                return printMsg('Credentials are required to sign in.', true);
            }

            const btn = document.getElementById('btnConnect');
            btn.innerHTML = 'Authenticating...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/internet/on', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, autoReconnect })
                });
                const data = await response.json();

                if (data.success) {
                    printMsg('Authentication request sent successfully.');
                    setTimeout(checkStatus, 1500);
                } else {
                    printMsg(data.error, true);
                }
            } catch (error) {
                printMsg('System unreachable. Check backend connection.', true);
            } finally {
                btn.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg> Sign In`;
                btn.disabled = false;
            }
        }

        async function disconnect() {
            try {
                const response = await fetch('/api/internet/off', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    printMsg('Securely signed out.');
                    document.getElementById('password').value = ''; // Clear password for security
                    setTimeout(checkStatus, 1500);
                }
            } catch (error) {
                printMsg('System unreachable.', true);
            }
        }

        async function checkStatus() {
            try {
                const response = await fetch('/api/internet/status');
                const data = await response.json();
                
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                
                if (data.connected) {
                    dot.className = 'status-dot online';
                    text.innerText = data.currentUser ? `Authenticated as ${data.currentUser}` : 'Connected to Network';
                    text.style.color = 'var(--brand-success)';
                } else {
                    dot.className = 'status-dot offline';
                    text.innerText = 'Not Authenticated';
                    text.style.color = 'var(--text-dark)';
                }
            } catch (error) {
                console.error('Status check failed', error);
            }
        }

        async function fetchConfig() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                const name = data.displayName;
                document.getElementById('userHeader').innerText = `${name}'s Network Authentication`;
                if (document.title.includes('Vidyagyan')) {
                    document.title = `${name} - Network Authentication`;
                }
            } catch (error) {
                console.error('Failed to fetch config', error);
            }
        }

        fetchConfig();
        // Poll status immediately, then every 3 seconds
        checkStatus();

        setInterval(checkStatus, 3000);
    </script>
</body>
</html>
